function buildNav(d) {
  const nav = d.navigation;
  const prev = nav.prev ? `<a href="case-study.html?project=${nav.prev.slug}" class="cs-nav__item"><span class="cs-nav__dir">← Previous</span><span class="cs-nav__title">${nav.prev.title}</span></a>` : `<div class="cs-nav__item" style="opacity:0.2;pointer-events:none;"><span class="cs-nav__dir">←</span><span class="cs-nav__title">—</span></div>`;
  const next = nav.next ? `<a href="case-study.html?project=${nav.next.slug}" class="cs-nav__item"><span class="cs-nav__dir">Next →</span><span class="cs-nav__title">${nav.next.title}</span></a>` : `<div class="cs-nav__item" style="opacity:0.2;pointer-events:none;"><span class="cs-nav__dir">→</span><span class="cs-nav__title">—</span></div>`;
  return `<nav class="cs-nav">${prev}${next}</nav>`;
}

/* ═══════════ ANIMATIONS ═══════════ */
function initAnims() {
  // Scroll reveal
  const ro = new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');ro.unobserve(e.target);}});
  },{threshold:0.12,rootMargin:'0px 0px -50px 0px'});
  document.querySelectorAll('.cs-reveal').forEach(el=>ro.observe(el));

  // Staggered process steps
  const stepObs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const i=parseInt(e.target.dataset.stepIndex)||0;
        setTimeout(()=>e.target.classList.add('visible'), i*140);
        stepObs.unobserve(e.target);
      }
    });
  },{threshold:0.15});
  document.querySelectorAll('.cs-step').forEach(el=>stepObs.observe(el));

  // Progress nav spy
  const nav = document.getElementById('cs-progress-nav');
  const hero = document.getElementById('cs-hero');
  const navItems = document.querySelectorAll('.cs-progress-nav__item');

  const heroObs = new IntersectionObserver(entries=>{
    nav.classList.toggle('visible',!entries[0].isIntersecting);
  },{threshold:0.1});
  if(hero) heroObs.observe(hero);

  const secObs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        navItems.forEach(item=>item.classList.toggle('active',item.dataset.target===e.target.id));
      }
    });
  },{threshold:0.4});
  SECTION_IDS.forEach(s=>{const el=document.getElementById(s.id);if(el)secObs.observe(el);});

  navItems.forEach(item=>{
    item.addEventListener('click',()=>{
      const t=document.getElementById(item.dataset.target);
      if(t) t.scrollIntoView({behavior:'smooth'});
    });
  });

  // Reading bar
  const bar = document.getElementById('cs-reading-bar');
  window.addEventListener('scroll',()=>{
    const d=document.documentElement;
    bar.style.width=((d.scrollTop/(d.scrollHeight-d.clientHeight))*100)+'%';
  },{passive:true});

  // Hero parallax on scroll
  const heroImg = document.querySelector('.cs-hero__cover img');
  if(heroImg){
    window.addEventListener('scroll',()=>{
      const p=Math.min(window.scrollY/window.innerHeight,1);
      heroImg.style.transform=`scale(${1.04+p*0.06})`;
    },{passive:true});
  }

  // Card lift on hover
  document.querySelectorAll('.cs-challenge,.cs-feature,.cs-metric,.cs-decision,.cs-lesson').forEach(el=>{
    el.addEventListener('mouseenter',()=>{el.style.transition='background .4s,transform .4s cubic-bezier(.165,.84,.44,1)';el.style.transform='translateY(-3px)';});
    el.addEventListener('mouseleave',()=>{el.style.transform='translateY(0)';});
  });

  // Portfolio cursor integration
  document.querySelectorAll('a,button,.cs-challenge,.cs-feature,.cs-decision,.cs-lesson,.cs-nav__item').forEach(el=>{
    el.addEventListener('mouseenter',()=>document.body.classList.add('cursor-hover'));
    el.addEventListener('mouseleave',()=>document.body.classList.remove('cursor-hover'));
  });
}

/* ═══════════ BOOT ═══════════ */
document.addEventListener('DOMContentLoaded',()=>{
  const slug = new URLSearchParams(window.location.search).get('project') || 'gis-city-viewer';
  const data = PROJECTS_MAP[slug] || Object.values(PROJECTS_MAP)[0];

  document.title = `${data.hero.title} — Case Study · Hossam Ayman`;

  const root = document.getElementById('cs-root');
  root.innerHTML = buildPage(data);

  requestAnimationFrame(initAnims);
});

/* ═══════════ PORTFOLIO CURSOR (reused) ═══════════ */
(function(){
  const dot=document.getElementById('cursor-dot');
  const ring=document.getElementById('cursor-ring');
  let mx=0,my=0,rx=0,ry=0;
  window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
  function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop);}
  loop();
})();
